<!DOCTYPE html>
<html lang="en">

<body>
    <p>multiply every element in the array with 10:</p>
    <p id="productvalue"></p>
    <script>
        var number=[28,6,9,95];
function myfunction(num){
    return num+10
}
var newarray=number.map(myfunction);
document.getElementById("productvalue").innerHTML=newarray;
    </script>
    
</body>
</html>
